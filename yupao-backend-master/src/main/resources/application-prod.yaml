# 生产环境配置（容器内运行时生效）
# 这些变量会被 application.yaml 的 ${user.datasource.*} 引用
# 支持通过环境变量覆盖，方便在 docker-compose 里注入
user:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 注意：host 是 docker-compose 中 mysql 服务的名字
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/happycat?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
